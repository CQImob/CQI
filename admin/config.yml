backend:
  name: github
  repo: CQImob/CQI
  branch: main
  base_url: https://sveltia-cms-auth.vercel.app
media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: ro
collections:
  - name: "proprietati"
    label: "Proprietăți"
    label_singular: "Proprietate"
    files:
      - label: "Lista proprietăților"
        name: "proprietati"
        file: "proprietati.json"
        fields:
          - label: "Proprietăți"
            name: "proprietati"
            widget: "list"
            label_singular: "Proprietate"
            fields:
              - label: "Titlu"
                name: "titlu"
                widget: "string"
              - label: "Pret"
                name: "pret"
                widget: "string"
              - label: "Tip tranzactie"
                name: "tip_tranzactie"
                widget: "select"
                options: ["De vânzare", "De închiriat"]
              - label: "Tip proprietate"
                name: "tip_proprietate"
                widget: "select"
                options: ["Apartament", "Casa", "Teren", "Spatiu comercial"]
              - label: "Număr camere"
                name: "camere"
                widget: "number"
                min: 0
                max: 20
                default: 0
              - label: "Suprafată"
                name: "suprafata"
                widget: "string"
                hint: "Ex: 85 mp"
              - label: "Locatie"
                name: "locatie"
                widget: "string"
                hint: "Ex: Brasov, Centrul Vechi"
              - label: "Imagine principală"
                name: "imagine"
                widget: "image"
                required: false
              - label: "Galerie foto"
                name: "galerie"
                widget: "list"
                required: false
                label_singular: "Fotografie"
                field:
                  label: "Fotografie"
                  name: "poza"
                  widget: "image"
              - label: "Descriere"
                name: "descriere"
                widget: "text"
                required: false
              - label: "Proprietate promovată"
                name: "featured"
                widget: "boolean"
                default: false
              - label: "Disponibil"
                name: "disponibil"
                widget: "boolean"
                default: true
